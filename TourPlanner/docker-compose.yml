services:
    db:
        image: postgres:15
        container_name: tour-planner-db
        restart: always
        environment:
            POSTGRES_USER: user
            POSTGRES_PASSWORD: password
            POSTGRES_DB: tourplanner_db
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U user -d tourplanner_db"]
            interval: 5s
            timeout: 5s
            retries: 5

    backend:
        build: ./backend
        container_name: tour-planner-be
        restart: on-failure
        depends_on:
            db:
                condition: service_healthy
        ports:
            - "8080:8080"
        volumes:
            - ./user_images:/app/Storage
            - ./logs:/app/logs
        environment:
            - ConnectionStrings__DefaultConnection=Host=db;Database=tourplanner_db;Username=user;Password=password
            - ASPNETCORE_ENVIRONMENT=Development
            - ASPNETCORE_HTTP_PORTS=8080

    frontend:
        build: ./frontend
        container_name: tour-planner-fe
        ports:
            - "4200:4200"

volumes:
    postgres_data: