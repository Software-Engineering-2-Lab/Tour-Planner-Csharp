services:
    db:
        image: postgres:15
        container_name: tour-planner-db
        restart: always
        environment:
            POSTGRES_USER: admin_user
            POSTGRES_PASSWORD: admin_password
            POSTGRES_DB: tourplanner_db
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./init.sh:/docker-entrypoint-initdb.d/init.sh
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U admin_user -d tourplanner_db"]
            interval: 5s
            timeout: 5s
            retries: 5

    backend:
        build: ./backend
        container_name: tour-planner-be
        restart: on-failure
        depends_on:
            db:
                condition: service_healthy
        ports:
            - "8080:8080"
        volumes:
            - ./backend:/app
            - ./user_images:/app/Storage
            - ./logs:/app/logs
        environment:
            - ConnectionStrings__DefaultConnection=Host=tour-planner-db;Database=tourplanner_db;Username=${DB_USER};Password=${DB_PASSWORD}
            - ASPNETCORE_ENVIRONMENT=Development
            - ASPNETCORE_HTTP_PORTS=8080

    frontend:
        build: ./frontend
        container_name: tour-planner-fe
        ports:
            - "4200:4200"
        volumes:
            - ./frontend:/app
            - /app/node_modules
        environment:
            - CHOKIDAR_USEPOLLING=true

volumes:
    postgres_data: