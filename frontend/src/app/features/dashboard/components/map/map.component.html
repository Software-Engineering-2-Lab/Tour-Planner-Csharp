<div class="map-wrapper">

  <div id="map-container" class="map-container">

    <div class="map-overlay">
      <select (change)="onRouteSelect($event)">
        <option value="" disabled selected>Choose a route</option>
        @for (route of availableRoutes; track route.label) {
          <option [value]="route.from + '-' + route.to">{{ route.label }}</option>
        }
      </select>

      @if (isLoading()) {
        <span class="loading-badge">Loading...</span>
      }

      @if (routeInfo(); as info) {
        <span class="route-info">{{ info.distanceKm }} km · {{ info.durationMin }} min</span>
      }
    </div>

  </div>

</div>
