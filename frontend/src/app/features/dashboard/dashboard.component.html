<div class="dashboard-viewport">
    <app-navbar (toggleSidebar)="sidebarOpen.set(!sidebarOpen())"></app-navbar>

    <div class="dashboard-body">
        @if (sidebarOpen()) {
            <div class="sidebar-backdrop" (click)="sidebarOpen.set(false)"></div>
        }

        <aside class="sidebar-island" [class.open]="sidebarOpen()">
            <app-tour-list (tourSelected)="sidebarOpen.set(false)"></app-tour-list>
        </aside>

        <main class="details-island">
            <app-tour-detail></app-tour-detail>
        </main>
    </div>
</div>
