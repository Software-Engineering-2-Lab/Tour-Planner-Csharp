<div class="modal-overlay">
    <div class="modal-container">
        <header class="modal-header">
            <span class="title">{{ editTour ? 'EDIT TOUR' : 'ADD NEW TOUR' }}</span>
            <button class="close-x" (click)="onCancel()">&#10006;</button>
        </header>

        <div class="modal-content">
            <div class="form-group">
                <label>TOUR NAME *</label>
                <input type="text" [(ngModel)]="name" placeholder="Text">
            </div>

            <div class="row">
                <div class="form-group flex-1">
                    <label>FROM *</label>
                    <input type="text" [(ngModel)]="fromLocation" (ngModelChange)="onInputChange()" placeholder="Start">
                </div>
                <div class="form-group flex-1">
                    <label>TO *</label>
                    <input type="text" [(ngModel)]="toLocation" (ngModelChange)="onInputChange()" placeholder="End">
                </div>
            </div>

            <div class="form-group">
                <label>TRANSPORT TYPE *</label>
                <div class="transport-selector">
                    <button [class.active]="transportType === 'BIKE'" (click)="setTransport('BIKE')">Bike</button>
                    <button [class.active]="transportType === 'HIKE'" (click)="setTransport('HIKE')">Hike</button>
                    <button [class.active]="transportType === 'WALK'" (click)="setTransport('WALK')">Walk</button>
                    <button [class.active]="transportType === 'DRIVE'" (click)="setTransport('DRIVE')">Drive</button>
                </div>
            </div> 

            <div class="ors-section">
                <label class="ors-label">LOCATION PREVIEW (via OpenRouteService)</label>
                <div class="info-box dashed" style="display: flex; flex-direction: column; gap: 8px; align-items: flex-start; padding: 15px;">
                    <div>
                        <strong>Identified From:</strong> {{ resolvedFromLocation || 'Waiting for input...' }}
                    </div>
                    <div>
                        <strong>Identified To:</strong> {{ resolvedToLocation || 'Waiting for input...' }}
                    </div>
                    
                    <div *ngIf="distance && estimatedTime" style="margin-top: 5px; color: #4caf50; display: flex; gap: 20px;">
                        <span><strong>Distance:</strong> {{ distance }} km</span>
                        <span><strong>Est. Time ({{ transportType }}):</strong> {{ formatTime(estimatedTime) }}</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>DESCRIPTION</label>
                <textarea rows="3" [(ngModel)]="description" placeholder="Optional description..."></textarea>
            </div>
        </div>

        <footer class="modal-footer">
            <button class="btn-cancel" (click)="onCancel()">Cancel</button>
            <button class="btn-save" (click)="onSave()">Save Tour</button>
        </footer>
    </div>
</div>
