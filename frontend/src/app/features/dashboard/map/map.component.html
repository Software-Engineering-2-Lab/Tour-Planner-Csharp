<div class="map-wrapper">
    <div id="map-container" class="map-container">
        <div class="map-overlay">
            @if (isLoading()) {
                <span class="loading-badge">Loading route...</span>
            }
            @if (routeInfo(); as info) {
                <span class="route-info">
                    {{ info.distanceKm }} km · {{ info.durationMin }} min
                </span>
            }
        </div>
    </div>
</div>
